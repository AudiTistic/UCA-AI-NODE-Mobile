name: cactus_openai_server
description: OpenAI-compatible API proxy server for Android phones
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  network_info_plus: ^5.0.0
  cactus: ^1.3.0
  wakelock_plus: ^1.1.4
  path_provider: ^2.1.2
  uuid: ^4.3.3
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

dependency_overrides:
  path: ^1.9.0
